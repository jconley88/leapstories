<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: sans-serif; padding: 12px; width: 240px; margin: 0; }
    h3 { margin: 0 0 10px; font-size: 14px; }
    label { display: block; margin-bottom: 2px; font-size: 12px; font-weight: bold; }
    input { width: 100%; box-sizing: border-box; margin-bottom: 8px; padding: 4px; font-size: 12px; }
    button { font-size: 12px; padding: 4px 10px; }
    #status { margin-left: 6px; color: green; font-size: 12px; }
  </style>
</head>
<body>
  <h3>LeapStories</h3>
  <form id="options-form">
    <label for="duplicate-prefix">Duplicate prefix</label>
    <input type="text" id="duplicate-prefix">

    <label for="duplicate-opacity">Duplicate opacity (0–1)</label>
    <input type="number" id="duplicate-opacity" min="0" max="1" step="0.05">

    <label for="dwell-seconds">Dwell time (seconds)</label>
    <input type="number" id="dwell-seconds" min="0" step="1">

    <label style="display:inline; font-weight:normal; margin-bottom:0;">
      <input type="checkbox" id="check-for-updates" style="width:auto; margin-bottom:0;"> Check for updates
    </label>
    <br>
    <button type="submit" style="margin-top:8px;">Save</button>
    <span id="status"></span>
  </form>
  <div id="update-banner" style="display:none; margin-top:10px; padding:8px; background:#fff3e0; border:1px solid #ff6600; border-radius:4px; font-size:11px;">
    Update available: <strong id="update-current"></strong> &rarr; <strong id="update-latest"></strong><br>
    <a id="update-link-store" href="#" target="_blank" style="color:#ff6600;">Update from extension store</a><br>
    <a id="update-link-github" href="#" target="_blank" style="color:#ff6600;">Download from GitHub</a>
  </div>
  <script src="config.js"></script>
  <script src="settings.js"></script>
  <script src="options.js"></script>
</body>
</html>
