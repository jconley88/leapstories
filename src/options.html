<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LeapStories Options</title>
  <style>
    body { font-family: sans-serif; padding: 1.5rem; max-width: 400px; }
    label { display: block; margin-bottom: 0.25rem; font-weight: bold; }
    input { width: 100%; box-sizing: border-box; margin-bottom: 1rem; padding: 0.4rem; }
    #status { margin-top: 0.5rem; color: green; }
  </style>
</head>
<body>
  <h2>LeapStories Options</h2>
  <form id="options-form">
    <label for="gap-prefix">Gap story prefix</label>
    <input type="text" id="gap-prefix">

    <label for="duplicate-prefix">Duplicate story prefix</label>
    <input type="text" id="duplicate-prefix">

    <label for="duplicate-opacity">Duplicate story opacity (0–1)</label>
    <input type="number" id="duplicate-opacity" min="0" max="1" step="0.05">

    <label for="dwell-seconds">Dwell time (seconds)</label>
    <input type="number" id="dwell-seconds" min="0" step="1">

    <label style="display:inline; font-weight:normal; margin-bottom:0;">
      <input type="checkbox" id="check-for-updates" style="width:auto; margin-bottom:0;"> Check for updates
    </label>
    <br>
    <button type="submit" style="margin-top:0.5rem;">Save</button>
    <span id="status"></span>
  </form>
  <div id="update-banner" style="display:none; margin-top:1rem; padding:10px; background:#fff3e0; border:1px solid #ff6600; border-radius:4px;">
    Update available: <strong id="update-current"></strong> &rarr; <strong id="update-latest"></strong><br>
    <a id="update-link-store" href="#" target="_blank" style="color:#ff6600;">Update from extension store</a><br>
    <a id="update-link-github" href="#" target="_blank" style="color:#ff6600;">Download from GitHub</a>
  </div>
  <script src="config.js"></script>
  <script src="settings.js"></script>
  <script src="options.js"></script>
</body>
</html>
