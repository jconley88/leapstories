<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LeapStories Options</title>
  <style>
    body { font-family: sans-serif; padding: 1.5rem; max-width: 400px; }
    label { display: block; margin-bottom: 0.25rem; font-weight: bold; }
    input { width: 100%; box-sizing: border-box; margin-bottom: 1rem; padding: 0.4rem; }
    #status { margin-top: 0.5rem; color: green; }
  </style>
</head>
<body>
  <h2>LeapStories Options</h2>
  <form id="options-form">
    <label for="duplicate-prefix">Duplicate story prefix</label>
    <input type="text" id="duplicate-prefix">

    <label for="duplicate-opacity">Duplicate story opacity (0–1)</label>
    <input type="number" id="duplicate-opacity" min="0" max="1" step="0.05">

    <button type="submit">Save</button>
    <span id="status"></span>
  </form>
  <script src="settings.js"></script>
  <script src="options.js"></script>
</body>
</html>
