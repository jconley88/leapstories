<svg xmlns="http://www.w3.org/2000/svg" viewBox="18 10 104 104">
  <!-- Concept C: Side-view orange frog with page lines, sitting low -->

  <!-- Body (squat, sitting on ground, side view facing right) -->
  <ellipse cx="62" cy="68" rx="32" ry="22" fill="#ff6600"/>

  <!-- Head (frog profile) -->
  <ellipse cx="92" cy="56" rx="22" ry="18" fill="#ff6600"/>

  <!-- Snout/nose bump -->
  <ellipse cx="110" cy="52" rx="8" ry="5" fill="#ff6600"/>

  <!-- Eye (big, prominent, on top of head) -->
  <circle cx="96" cy="38" r="11" fill="#ff6600"/>
  <circle cx="96" cy="37" r="8" fill="#ffffff"/>
  <circle cx="98" cy="36" r="4" fill="#222222"/>
  <!-- Eye highlight -->
  <circle cx="95" cy="34" r="1.5" fill="#ffffff"/>

  <!-- Mouth line -->
  <path d="M 104 58 Q 114 56 118 52" fill="none" stroke="#cc5200" stroke-width="2" stroke-linecap="round"/>

  <!-- Nostril -->
  <circle cx="114" cy="48" r="1.5" fill="#cc5200"/>

  <!-- Page lines across body -->
  <line x1="40" y1="58" x2="80" y2="58" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="38" y1="66" x2="82" y2="66" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="40" y1="74" x2="78" y2="74" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="44" y1="82" x2="68" y2="82" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.45"/>

  <!-- Front leg (short, touching ground) -->
  <path d="M 82 84 L 84 92" fill="none" stroke="#ff6600" stroke-width="6" stroke-linecap="round"/>
  <circle cx="85" cy="94" r="3" fill="#cc5200"/>
  <circle cx="89" cy="93" r="2.5" fill="#cc5200"/>

  <!-- Back leg (folded haunch, foot flat on ground) -->
  <path d="M 38 86 Q 30 90 28 94" fill="none" stroke="#ff6600" stroke-width="6" stroke-linecap="round"/>
  <circle cx="28" cy="94" r="3" fill="#cc5200"/>
  <circle cx="23" cy="94" r="2.5" fill="#cc5200"/>
  <circle cx="33" cy="94" r="2.5" fill="#cc5200"/>

  <!-- Belly highlight -->
  <ellipse cx="65" cy="80" rx="18" ry="5" fill="#ff8533" opacity="0.5"/>
</svg>
